<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Minhas Especificações</title>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
  
  <style>
    /* =======================================================
       🎨 CONFIGURAÇÃO DE CORES DA PÁGINA (VISUAL DE FÁBRICA)
       ======================================================= */
    :root {
      --cor-principal: #9333ea; /* Roxo padrão das bordas */
      --cor-hover: #a855f7;     /* Roxo claro padrão do hover/ícones */
      --border-window: rgba(255, 255, 255, 0.08); /* Borda padrão da janela */
      --cor-fundo-gradiente: #25003b; /* Roxo escuro padrão do fundo */
    }

    body {
      display: block;
      background: linear-gradient(135deg, #000000, var(--cor-fundo-gradiente));
      background-repeat: no-repeat;
      background-size: cover;
      min-height: 100vh;
      margin: 0px;
      padding: 0px;
      padding-bottom: 80px;
    }

    .bottom-bar {
      position: fixed;
      bottom: 0;
      left: 0;
      box-sizing: border-box;
      width: 100%;
      padding: 14px 18px;
      display: flex;
      justify-content: space-between;
      align-items: center;
      background: rgba(10, 10, 15, 0.55);
      backdrop-filter: blur(10px);
      border-top: 1px solid rgba(255, 255, 255, 0.06);
      z-index: 50;
    }

    .socials {
      display: flex;
      gap: 16px;
    }

    .socials a {
      font-size: 22px;
      color: rgba(255, 255, 255, 0.75);
      transition: 0.2s ease;
    }

    .socials a:hover {
      color: var(--cor-hover); /* Segue a cor dinâmica */
      transform: scale(1.12);
    }
    
    .window {
      width: min(900px, 95vw);
      height: min(480px, 85vh);
      margin: 40px auto;
      border-radius: 10px;
      border: 1px solid var(--border-window); /* Dinâmico */
      background: rgba(15, 15, 20, 0.40);
      backdrop-filter: blur(14px);
      box-shadow: 0 5px 20px rgba(0, 0, 0, 0.6);
      overflow: hidden;
      font-family: system-ui, sans-serif;
      transition: border-color 0.3s ease;
    }

    .window-titlebar {
      height: 30px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 0 14px;
      background: #0c0014;
      border-bottom: 1px solid rgba(255, 255, 255, 0.06);
    }

    .window-title {
      font-size: 14px;
      color: rgba(255, 255, 255, 0.85);
      font-weight: 500;
      user-select: none;
    }

    .window-controls {
      display: flex;
      gap: 8px;
    }

    .window-controls .btn {
      width: 12px;
      height: 12px;
      border-radius: 50%;
      display: inline-block;
      border: 1px solid rgba(255, 255, 255, 0.12);
      background: rgba(255, 255, 255, 0.06);
      transition: transform 0.15s ease, background 0.15s ease;
    }

    .window-controls .btn:hover {
      transform: scale(1.15);
      background: rgba(255, 255, 255, 0.16);
    }

    .window-controls .close:hover { background: rgba(255, 60, 60, 0.55); }
    .window-controls .max:hover { background: rgba(60, 255, 150, 0.35); }
    .window-controls .min:hover { background: rgba(255, 200, 60, 0.35); }

    .window-content {
      padding: 24px;
      height: calc(100% - 54px);
      color: rgba(255, 255, 255, 0.88);
      font-size: 17px;
      line-height: 1.6;
      overflow-y: auto;
    }

    /* Estilização dos Links de Hardware */
    .links-lista {
      display: flex;
      flex-direction: column;
      gap: 15px;
      margin-top: 20px;
    }

    .spec-link {
      display: flex;
      align-items: center;
      gap: 15px;
      background: rgba(0, 0, 0, 0.4);
      border: 1px solid rgba(147, 51, 234, 0.3);
      border-color: var(--cor-principal); /* Dinâmico */
      border-radius: 8px;
      padding: 14px 20px;
      color: #ffffff;
      text-decoration: none;
      font-size: 1rem;
      font-weight: bold;
      transition: all 0.25s ease;
    }

    .spec-link i {
      color: var(--cor-hover); /* Dinâmico */
      font-size: 1.2rem;
    }

    .spec-link:hover {
      background: rgba(147, 51, 234, 0.15);
      border-color: var(--cor-hover); /* Dinâmico */
      color: var(--cor-hover); /* Dinâmico */
      transform: translateX(5px);
      box-shadow: 0 0 15px var(--cor-hover); /* Brilho dinâmico */
    }

    .window-content::-webkit-scrollbar { width: 5px; }
    .window-content::-webkit-scrollbar-track { background: rgba(255, 255, 255, 0.03); }
    .window-content::-webkit-scrollbar-thumb { background: rgba(255, 255, 255, 0.12); border-radius: 20px; }

    .home-btn {
      text-decoration: none;
      font-size: 14px;
      font-weight: 500;
      padding: 6px 12px;
      border-radius: 12px;
      color: rgba(255, 255, 255, 0.9);
      background: rgba(255, 255, 255, 0.08);
      border: 1px solid rgba(255, 255, 255, 0.12);
      transition: 0.2s ease;
    }

    .home-btn:hover {
      background: rgba(255, 255, 255, 0.14);
      border-color: var(--cor-hover); /* Dinâmico */
      transform: scale(1.04);
    }
  </style>
</head>
<body>

  <div class="window">
    <div class="window-titlebar">
      <div class="window-title">Especificações do Sistema</div>
      <div class="window-controls">
        <span class="btn min"></span>
        <span class="btn max"></span>
        <span class="btn close"></span>
      </div>
    </div>

    <div class="window-content">
      <p style="margin-bottom: 20px; color: rgba(255,255,255,0.6);">Selecione um relatório para visualizar os prints de hardware do Acer Nitro V15:</p>
      
      <div class="links-lista">
        <a href="spec.jpg" class="spec-link" target="_blank">
          <i class="fa-solid fa-file-image"></i> Meu PC - Relatório Página 1
        </a>
        <a href="spec2.png" class="spec-link" target="_blank">
          <i class="fa-solid fa-file-image"></i> Meu PC - Relatório Página 2
        </a>
      </div>
    </div>
  </div>

  <div class="bottom-bar">
    <div class="socials">
      <a href="https://github.com/ghost77-coder" target="_blank"><i class="fa-brands fa-github"></i></a>
      <a href="https://www.instagram.com/p3ter.7_7?igsh=MXdlYm9kb2Jpbzh2Zg==" target="_blank"><i class="fa-brands fa-instagram"></i></a>
    </div>
    <a href="../../index.html" class="home-btn">Voltar para a Página Inicial</a>
  </div>

  <script>
    window.addEventListener('DOMContentLoaded', () => {
      const savedColor = localStorage.getItem('ghost-theme-color');
      if (savedColor) {
        document.documentElement.style.setProperty('--cor-principal', savedColor);
        document.documentElement.style.setProperty('--cor-hover', savedColor);
        document.documentElement.style.setProperty('--border-window', savedColor);
        
        // Mantém a pegada sutil do fundo usando a cor global
        const darkBackgroundTone = savedColor + "24"; 
        document.documentElement.style.setProperty('--cor-fundo-gradiente', darkBackgroundTone);
      }
    });
  </script>

</body>
</html>
