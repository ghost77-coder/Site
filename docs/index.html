<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=0.9">
  <title>Ghost Central // Home</title>
  
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">

  <style>
    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    body {
      font-family: 'Courier New', Courier, monospace;
      color: #00e5ff;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      overflow-x: hidden;
      background-color: #050f19;
    }

    /* Configuração do Vídeo de Fundo Animado */
    .bg-video {
      position: fixed;
      right: 0;
      bottom: 0;
      min-width: 100%;
      min-height: 100%;
      width: auto;
      height: auto;
      z-index: -100;
      object-fit: cover;
    }

    /* Camada escura por cima do vídeo */
    .overlay {
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      background: rgba(5, 15, 25, 0.55);
      z-index: -99;
    }

    /* Container Principal - Compacto */
    .main-container {
      position: relative;
      z-index: 10;
      background: rgba(6, 12, 20, 0.75);
      backdrop-filter: blur(12px);
      -webkit-backdrop-filter: blur(12px);
      border: 1px solid rgba(0, 229, 255, 0.2);
      border-radius: 16px;
      padding: 25px 30px;
      width: min(420px, 92vw);
      text-align: center;
      box-shadow: 0 0 35px rgba(0, 140, 255, 0.25);
      transition: border-color 0.4s ease, box-shadow 0.4s ease;
    }

    .main-container:hover {
      border-color: #008cff;
      box-shadow: 0 0 40px rgba(0, 229, 255, 0.4);
    }

    /* Imagem do Eve-OwO */
    .avatar {
      width: 140px;
      height: auto;
      border-radius: 50%;
      border: 2px solid #00e5ff;
      box-shadow: 0 0 20px rgba(0, 229, 255, 0.4);
      margin-bottom: 15px;
      transition: transform 0.3s ease;
    }

    .avatar:hover {
      transform: scale(1.05) rotate(3deg);
    }

    h1 {
      font-size: 1.8rem;
      margin-bottom: 5px;
      color: #ffffff;
      text-transform: uppercase;
      letter-spacing: 3px;
      text-shadow: 0 0 15px rgba(0, 229, 255, 0.6);
    }

    .subtitle {
      font-size: 0.85rem;
      color: rgba(0, 229, 255, 0.7);
      margin-bottom: 20px;
      letter-spacing: 1px;
    }

    /* Menu de Links */
    .menu-links {
      display: flex;
      flex-direction: column;
      gap: 10px;
    }

    .menu-item {
      display: flex;
      align-items: center;
      gap: 15px;
      background: rgba(0, 0, 0, 0.5);
      border: 1px solid rgba(0, 229, 255, 0.15);
      border-radius: 8px;
      padding: 12px 18px;
      color: #ffffff;
      text-decoration: none;
      font-size: 0.95rem;
      font-weight: bold;
      letter-spacing: 1px;
      transition: all 0.25s cubic-bezier(0.25, 0.8, 0.25, 1);
    }

    .menu-item i {
      color: #00e5ff;
      font-size: 1.1rem;
      width: 20px;
      text-align: center;
      transition: transform 0.3s ease;
    }

    .menu-item:hover {
      background: rgba(0, 140, 255, 0.2);
      border-color: #00e5ff;
      color: #00e5ff;
      transform: translateX(5px);
      box-shadow: 0 0 15px rgba(0, 229, 255, 0.2);
    }

    .menu-item:hover i {
      transform: scale(1.2);
    }

    /* Rodapé Social */
    .social-footer {
      margin-top: 25px;
      display: flex;
      justify-content: center;
      gap: 20px;
      border-top: 1px solid rgba(255, 255, 255, 0.08);
      padding-top: 15px;
    }

    .social-footer a {
      color: rgba(255, 255, 255, 0.6);
      font-size: 1.3rem;
      transition: all 0.2s ease;
    }

    .social-footer a:hover {
      color: #00e5ff;
      transform: scale(1.15);
      text-shadow: 0 0 10px rgba(0, 229, 255, 0.5);
    }
  </style>
</head>
<body>

  <video autoplay loop muted playsinline class="bg-video">
    <source src="296664_medium.mp4" type="video/mp4">
  </video>
  
  <div class="overlay"></div>

  <div class="main-container">
    <img src="eve-owo.png" alt="Ghost Avatar" class="avatar">
    
    <h1>GHOST</h1>
    <div class="subtitle">Bem-vindo ao Submundo Tecnológico</div>

    <div class="menu-links">
      <a href="docs/About/index.html" class="menu-item">
        <i class="fa-solid fa-ghost"></i> Sobre Mim
      </a>
      
      <a href="docs/My specs/index.html" class="menu-item">
        <i class="fa-solid fa-microchip"></i> Meu Setup / Specs
      </a>
      
      <a href="docs/coolapps/index.html" class="menu-item">
        <i class="fa-solid fa-cubes"></i> Apps Úteis
      </a>
      
      <a href="docs/cpicker/index.html" class="menu-item">
        <i class="fa-solid fa-eye-dropper"></i> Seletor de Cores
      </a>

      <a href="docs/themes.html" class="menu-item">
        <i class="fa-solid fa-palette"></i> Temas Firefox
      </a>
    </div>

    <div class="social-footer">
      <a href="https://github.com/ghost77-coder" target="_blank"><i class="fa-brands fa-github"></i></a>
      <a href="https://www.instagram.com/p3ter.7_7?igsh=MXdlYm9kb2Jpbzh2Zg==" target="_blank"><i class="fa-brands fa-instagram"></i></a>
    </div>
  </div>

</body>
</html>
